
<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        #text-container { position: absolute; text-align: center; font-size: 50px; font-weight: bold; opacity: 0; transition: opacity 0.5s; }
        #image-container { position: absolute; width: 100%; height: 100%; display: none; background-size: contain; background-position: center; background-repeat: no-repeat; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="text-container">How to actually make a video game.</div>
    <div id="image-container"></div>
    <script>
        const oneFiles = ["1 - Current.jpg","1 - Screenshot 2026-04-27 143918.jpg","1 - Screenshot 2026-04-30 112825.jpg","1 - Screenshot 2026-05-01 160521.jpg","1 - Screenshot 2026-05-01 161210.jpg","1 - Screenshot 2026-05-01 161715.jpg","1 - Screenshot 2026-05-05 094505.jpg","1 - Screenshot 2026-05-10 063804.jpg","1 - Screenshot 2026-05-10 063825.jpg","1 - Screenshot 2026-05-10 065627.jpg","1 - Screenshot 2026-05-10 070457.jpg","1 - Screenshot 2026-05-10 073021.jpg","1 - Screenshot 2026-05-10 073700.jpg","1 - Screenshot 2026-05-10 074556.jpg","1 - correct.jpg","1 - linkable.jpg","1 - smack_that_still.jpg","1 -Screenshot 2026-04-28 162145.jpg","1- publisher_page.png","1 - Current.jpg","1 - Screenshot 2026-04-27 143918.jpg","1 - Screenshot 2026-04-30 112825.jpg","1 - Screenshot 2026-05-01 160521.jpg","1 - Screenshot 2026-05-01 161210.jpg","1 - Screenshot 2026-05-01 161715.jpg","1 - Screenshot 2026-05-05 094505.jpg","1 - Screenshot 2026-05-10 063804.jpg","1 - Screenshot 2026-05-10 063825.jpg","1 - Screenshot 2026-05-10 065627.jpg","1 - Screenshot 2026-05-10 070457.jpg","1 - Screenshot 2026-05-10 073021.jpg","1 - Screenshot 2026-05-10 073700.jpg","1 - Screenshot 2026-05-10 074556.jpg","1 - correct.jpg","1 - linkable.jpg","1 - smack_that_still.jpg","1 -Screenshot 2026-04-28 162145.jpg","1- publisher_page.png"];
        const twoFile = "2 - final.jpg";
        
        const textContainer = document.getElementById('text-container');
        const imgContainer = document.getElementById('image-container');
        
        async function run() {
            // 0.0s - 1.5s: Text fade in and out
            setTimeout(() => { textContainer.style.opacity = 1; }, 100);
            setTimeout(() => { textContainer.style.opacity = 0; }, 1000);
            
            // 1.5s: Start slideshow
            setTimeout(async () => {
                textContainer.style.display = 'none';
                imgContainer.style.display = 'block';
                
                for (let i = 0; i < oneFiles.length; i++) {
                    imgContainer.style.backgroundImage = 'url("' + encodeURIComponent(oneFiles[i]) + '")';
                    await new Promise(r => setTimeout(r, 500));
                }
                
                // End: Show twoFile and confetti
                imgContainer.style.backgroundImage = 'url("' + encodeURIComponent(twoFile) + '")';
                
                // Fire confetti
                var duration = 3000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 15, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 15, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
                
            }, 1500);
        }
        
        run();
    </script>
</body>
</html>
