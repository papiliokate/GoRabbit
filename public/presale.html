<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Rabbit - Binge Sets Coming Soon!</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #111;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 40px;
        border-radius: 20px;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
        background: linear-gradient(135deg, #e91e63 0%, #ff6090 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        font-size: 1.1rem;
        line-height: 1.5;
        margin-bottom: 30px;
      }
      .back-btn {
        display: inline-block;
        padding: 12px 24px;
        font-size: 1.1rem;
        font-weight: bold;
        color: white;
        background: #333;
        border: none;
        border-radius: 12px;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.2s;
      }
      .back-btn:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎟️ Binge Sets Coming Soon!</h1>
      <p>We're working hard to bring you unlimited daily puzzles. Soon, you'll be able to purchase Binge Sets to play as much as you want!</p>
      <a href="/" class="back-btn">Return to Game</a>
    </div>
  </body>
</html>
