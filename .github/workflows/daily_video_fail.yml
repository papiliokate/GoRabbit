name: Daily Video - Fail

on:
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          
      - name: Install Puppeteer System Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev xvfb ffmpeg
          npx puppeteer browsers install chrome

      - name: Generate Fail Video
        run: xvfb-run --auto-servernum node scripts/generate_video.js
        env:
          HEADLESS: "false"
          FORMAT: "fail"

      - name: Build App
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Ping Zapier Webhook
        run: |
          CAPTIONS=(
            "I literally cannot believe I missed this obvious path 😭 play free at go-rabbit-4af82.web.app"
            "This level broke my brain before I saw the solution 🤯 go-rabbit-4af82.web.app"
            "Why is today's map literally impossible? Oh wait... 🐰 go-rabbit-4af82.web.app"
          )
          YOUTUBE_TITLES=(
            "I Can't Believe I Missed This! (#Fail)"
            "Hardest Puzzle Ever? (#Shorts)"
            "This Level Broke My Brain (#Gaming)"
          )
          R_INDEX=$(( $RANDOM % 3 ))
          CAPTION="${CAPTIONS[$R_INDEX]} #Fail #GoRabbit #DailyPuzzle #"$(date +'%Y%m%d')
          YT_TITLE="${YOUTUBE_TITLES[$R_INDEX]}"
          
          curl --fail --silent --show-error -X POST -H "Content-Type: application/json" \
          -d "{\"video_url\": \"https://go-rabbit-4af82.web.app/daily_video.mp4\", \"text\": \"$CAPTION\", \"youtube_title\": \"$YT_TITLE\", \"target_channel\": \"all\"}" \
          https://hooks.zapier.com/hooks/catch/27231889/ujm5mjh/ || exit 1
          
          echo "Deployed public video and pinged Zapier!"
