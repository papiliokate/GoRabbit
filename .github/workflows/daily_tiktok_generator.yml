name: Daily TikTok Generator

on:
  schedule:
    # Run at 00:30 UTC every day, ensuring it always runs AFTER the map generator
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  generate-tiktok:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          
      - name: Install Puppeteer System Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev xvfb ffmpeg
          npx puppeteer browsers install chrome

      - name: Generate TikTok Video
        run: xvfb-run --auto-servernum node scripts/generate_tiktok.js
        env:
          HEADLESS: "false"

      - name: Build App (Syncs public/ folder to dist/)
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Ping Zapier Webhook
        run: |
          CAPTIONS=(
            "My brain hurts from this one 🤯 Drop your move count below! Play free at go-rabbit-4af82.web.app 🥕"
            "Can you spot the winning move before the bot does? 🐰 Play free at go-rabbit-4af82.web.app"
            "Only 10% of players can beat this under 12 moves! Test your brain at go-rabbit-4af82.web.app 🥕"
            "Today's Go Rabbit Daily Puzzle! 🐰 Can you beat it? Play free at go-rabbit-4af82.web.app"
            "This layout is brutal! Can you do it in less moves than the bot? 🚀 play at go-rabbit-4af82.web.app"
          )
          RANDOM_INDEX=$(( $RANDOM % 5 ))
          SELECTED_CAPTION="${CAPTIONS[$RANDOM_INDEX]}"
          CAPTION="$SELECTED_CAPTION #GoRabbit #DailyPuzzle #PuzzleGame #BrainTeaser #Gaming #"$(date +'%Y%m%d')
          curl -X POST -H "Content-Type: application/json" -d "{\"video_url\": \"https://go-rabbit-4af82.web.app/daily_tiktok.mp4\", \"text\": \"$CAPTION\"}" https://hooks.zapier.com/hooks/catch/27231889/ujm5mjh/
          echo "Deployed public video and pinged Zapier with dynamic rotating caption!"
