name: Daily Video - Standard

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          
      - name: Install Puppeteer System Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev xvfb ffmpeg
          npx puppeteer browsers install chrome

      - name: Generate Standard Video
        run: xvfb-run --auto-servernum node scripts/generate_video.js
        env:
          HEADLESS: "false"
          FORMAT: "standard"

      - name: Build App (Syncs public/ folder to dist/)
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Ping Zapier Webhook
        run: |
          CAPTIONS=(
            "Can you spot the winning move before the bot does? 🐰 Play free at go-rabbit-4af82.web.app"
            "Only 10% of players can beat this under 12 moves! Test your brain at go-rabbit-4af82.web.app 🥕"
            "Today's Go Rabbit Daily Puzzle! 🐰 Can you beat it? Play free at go-rabbit-4af82.web.app"
          )
          YOUTUBE_TITLES=(
            "Can You Solve Today's Level? (#Shorts)"
            "Fastest Way To Win (#Puzzle)"
            "Daily Go Rabbit Challenge (#Gaming)"
          )
          R_INDEX=$(( $RANDOM % 3 ))
          CAPTION="${CAPTIONS[$R_INDEX]} #GoRabbit #DailyPuzzle #Gaming #"$(date +'%Y%m%d')
          YT_TITLE="${YOUTUBE_TITLES[$R_INDEX]}"
          
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"video_url\": \"https://go-rabbit-4af82.web.app/daily_video.mp4\", \"text\": \"$CAPTION\", \"youtube_title\": \"$YT_TITLE\", \"target_channel\": \"all\"}" \
          https://hooks.zapier.com/hooks/catch/27231889/ujm5mjh/
          
          echo "Deployed public video and pinged Zapier!"
