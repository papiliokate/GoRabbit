name: Generate Daily Maps

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Maps
        run: npm run generate-maps

      - name: Generate TikTok Video
        run: npm run generate-tiktok

      - name: Build App
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Cleanup old releases
        run: |
          # The SITE_ID is usually your project ID or the specific site defined in your Firebase console.
          # Replace 'gorabbit' with your actual Firebase Site ID if it fails to cleanup.
          npx firebase-tools hosting:releases:delete gorabbit --keep 5 --force --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Cleanup failed. Check if SITE_ID is correct."
