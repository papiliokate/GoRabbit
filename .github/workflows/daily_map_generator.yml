name: Generate Daily Maps

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Generate Maps
        run: npm run generate-maps

      - name: Build App
        run: npm run build

      - name: Commit maps to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily_maps.json
          git commit -m "chore: push daily maps" || echo "No changes to commit"
          git push

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Cleanup old releases
        run: |
          # The SITE_ID is usually your project ID or the specific site defined in your Firebase console.
          # Replace 'gorabbit' with your actual Firebase Site ID if it fails to cleanup.
          npx firebase-tools hosting:releases:delete go-rabbit-4af82 --project go-rabbit-4af82 --keep 5 --force --token "${{ secrets.FIREBASE_TOKEN }}" || echo "Cleanup failed. Check if SITE_ID is correct."
